<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>학부모 알림장 생성기</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
</head>

<body>
  <main class="app">

    <section class="header">
      <div class="emoji">🌷</div>
      <h1>학부모 알림장 생성기</h1>
      <p>
        상황을 선택하고 문장을 만든 뒤 직접 수정하여 복사하거나 번역할 수 있습니다.
      </p>
      <span class="badge">무료 모드 · API 비용 없음</span>
    </section>

    <section class="card">
      <label for="studentName">학생 이름</label>
      <input id="studentName" type="text" placeholder="예: 세나" />

      <label for="time">시간대</label>
      <select id="time">
        <option value="">선택 안 함</option>
        <option value="오늘 오전">오늘 오전</option>
        <option value="오늘 점심시간">오늘 점심시간</option>
        <option value="오늘 오후">오늘 오후</option>
        <option value="하교 전">하교 전</option>
        <option value="방과 후">방과 후</option>
      </select>

      <label for="category">카테고리</label>
      <select id="category" onchange="updateSituations()">
        <option value="safety">안전 / 다침</option>
        <option value="health">보건 / 건강</option>
        <option value="friend">친구 관계</option>
        <option value="life">생활지도</option>
        <option value="study">학습 / 준비물</option>
        <option value="praise">칭찬 / 성장</option>
        <option value="home">가정 협조</option>
      </select>

      <label for="situation">상황 선택</label>
      <select id="situation" onchange="toggleSupplyBox()"></select>

      <div id="supplyBox" class="hidden">
        <label for="supplyItem">가져와야 할 준비물</label>
        <input
          id="supplyItem"
          type="text"
          placeholder="예: 색연필, 풀, 가위, 여벌 옷"
        />
      </div>

      <label for="tone">말투 톤</label>
      <select id="tone">
        <option value="basic">기본 안내 톤</option>
        <option value="warm">따뜻한 톤</option>
        <option value="polite">정중한 톤</option>
        <option value="short">간단한 톤</option>
      </select>

      <label for="extra">추가 내용</label>
      <textarea
        id="extra"
        placeholder="예: 오른쪽 무릎이 조금 까졌고 보건실에서 소독 후 밴드를 붙였습니다."
      ></textarea>

      <button class="main-btn" onclick="generateMessage()">
        ✨ 알림장 예시 생성
      </button>
    </section>

    <section id="result" class="result hidden">
      <div class="message-card">
        <h2>🇰🇷 생성된 문장</h2>
        <p class="guide">
          아래 문장은 직접 수정할 수 있습니다. 수정한 문장 그대로 복사하거나 번역할 수 있어요.
        </p>

        <textarea id="finalMessage"></textarea>

        <div class="button-row">
          <button class="small-btn gray" onclick="copyFinalMessage()">
            📋 복사하기
          </button>

          <button class="small-btn pink" onclick="openTranslate('en')">
            🇺🇸 영어
          </button>

          <button class="small-btn pink" onclick="openTranslate('zh-CN')">
            🇨🇳 중국어
          </button>

          <button class="small-btn pink" onclick="openTranslate('tr')">
            🇹🇷 터키어
          </button>

          <button class="small-btn pink" onclick="openTranslate('vi')">
            🇻🇳 베트남어
          </button>
        </div>

        <button class="school-btn" onclick="openSchoolBell()">
          🟢 학교종이 열기
        </button>

        <p class="notice">
          학교종이 버튼을 누르면 현재 문장이 자동 복사된 뒤 학교종이 페이지가 열립니다.
        </p>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
